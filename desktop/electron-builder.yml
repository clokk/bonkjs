# Packaging config — rationale in docs/DESKTOP.md.
# Default mode = ad-hoc signed ($0, works via Steam/itch-app; direct download
# gets the Gatekeeper "Open Anyway" ritual). For the notarized build (clean
# direct download + auto-update), flip the marked block and export
# APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER (App Store Connect key —
# preferred over Apple ID creds, which die on password change).
appId: com.shmoves.bonk-desktop
productName: bonk-desktop
directories:
  output: release
  buildResources: build
files:
  - main.mjs
  - preload.cjs
  - dist-web/**

mac:
  category: public.app-category.games
  target:
    - target: zip
      arch: [arm64]
    - target: dmg
      arch: [arm64]
  # --- SIGNED mode (current): auto-discovers the Developer ID Application
  # identity from the login keychain (CSC_LINK/CSC_KEY_PASSWORD in CI).
  # No identity name here on purpose — this repo is public.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  # Flip to true once APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER are
  # set (App Store Connect key) — that's the full clean-direct-download build.
  notarize: false
  # --- ad-hoc mode ($0 fallback, no Apple account): replace the block above with
  # identity: '-'
  # hardenedRuntime: false
